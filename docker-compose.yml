services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skeleton
      POSTGRES_USER: redyx
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./deploy/docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redyx -d skeleton"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  skeleton-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: skeleton
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/skeleton?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GRPC_PORT: "50051"
    ports: ["50051:50051"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: auth
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/auth?sslmode=disable
      REDIS_URL: redis://redis:6379/1
      GRPC_PORT: "50052"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
    ports: ["50052:50052"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: user
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/user_profiles?sslmode=disable
      REDIS_URL: redis://redis:6379/2
      GRPC_PORT: "50053"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
    ports: ["50053:50053"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  community-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: community
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/community?sslmode=disable
      REDIS_URL: redis://redis:6379/3
      GRPC_PORT: "50054"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
    ports: ["50054:50054"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  envoy:
    image: envoyproxy/envoy:v1.37.0
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./deploy/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./deploy/envoy/proto.pb:/etc/envoy/proto.pb:ro
    depends_on:
      - skeleton-service
      - auth-service
      - user-service
      - community-service

volumes:
  pg-data:
