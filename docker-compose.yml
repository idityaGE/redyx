services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skeleton
      POSTGRES_USER: redyx
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./deploy/docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redyx -d skeleton"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  skeleton-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: skeleton
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/skeleton?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GRPC_PORT: "50051"
    ports: ["50051:50051"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: auth
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/auth?sslmode=disable
      REDIS_URL: redis://redis:6379/1
      GRPC_PORT: "50052"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
    ports: ["50052:50052"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: user
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/user_profiles?sslmode=disable
      REDIS_URL: redis://redis:6379/2
      GRPC_PORT: "50053"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      KAFKA_BROKERS: "kafka:9092"
      POST_SHARD_DSNS: "postgres://redyx:dev@postgres:5432/posts_shard_0?sslmode=disable,postgres://redyx:dev@postgres:5432/posts_shard_1?sslmode=disable"
    ports: ["50053:50053"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  community-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: community
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/community?sslmode=disable
      REDIS_URL: redis://redis:6379/3
      GRPC_PORT: "50054"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
    ports: ["50054:50054"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.7.2
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  post-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: post
    environment:
      REDIS_URL: redis://redis:6379/4
      GRPC_PORT: "50055"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      KAFKA_BROKERS: "kafka:9092"
      POST_SHARD_DSNS: "postgres://redyx:dev@postgres:5432/posts_shard_0?sslmode=disable,postgres://redyx:dev@postgres:5432/posts_shard_1?sslmode=disable"
      COMMUNITY_DATABASE_URL: "postgres://redyx:dev@postgres:5432/community?sslmode=disable"
      MEDIA_DATABASE_URL: "postgres://redyx:dev@postgres:5432/media?sslmode=disable"
    ports: ["50055:50055"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  vote-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: vote
    environment:
      REDIS_URL: redis://redis:6379/5
      GRPC_PORT: "50056"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      KAFKA_BROKERS: "kafka:9092"
    ports: ["50056:50056"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  scylladb:
    image: scylladb/scylla:6.2
    ports: ["9042:9042"]
    command: --smp 1 --memory 512M --developer-mode 1
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  comment-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: comment
    environment:
      SCYLLADB_HOSTS: "scylladb:9042"
      SCYLLADB_KEYSPACE: "redyx_comments"
      REDIS_URL: redis://redis:6379/6
      GRPC_PORT: "50057"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      KAFKA_BROKERS: "kafka:9092"
    ports: ["50057:50057"]
    depends_on:
      scylladb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports: ["7700:7700"]
    environment:
      MEILI_MASTER_KEY: "dev-master-key"
      MEILI_ENV: "development"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/redyx-media --ignore-existing &&
      mc anonymous set download local/redyx-media
      "

  search-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: search
    environment:
      REDIS_URL: redis://redis:6379/7
      GRPC_PORT: "50058"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      KAFKA_BROKERS: "kafka:9092"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_API_KEY: "dev-master-key"
      COMMUNITY_DATABASE_URL: "postgres://redyx:dev@postgres:5432/community?sslmode=disable"
    ports: ["50058:50058"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: notification
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/notifications?sslmode=disable
      REDIS_URL: redis://redis:6379/8
      GRPC_PORT: "50059"
      WEBSOCKET_PORT: "8081"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      KAFKA_BROKERS: "kafka:9092"
    ports: ["50059:50059", "8081:8081"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  media-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: media
    environment:
      DATABASE_URL: postgres://redyx:dev@postgres:5432/media?sslmode=disable
      REDIS_URL: redis://redis:6379/9
      GRPC_PORT: "50060"
      JWT_SECRET: "dev-jwt-secret-32-bytes-minimum!!"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_PUBLIC_ENDPOINT: "http://localhost:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "redyx-media"
    ports: ["50060:50060"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  envoy:
    image: envoyproxy/envoy:v1.37.0
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./deploy/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./deploy/envoy/proto.pb:/etc/envoy/proto.pb:ro
    depends_on:
      - skeleton-service
      - auth-service
      - user-service
      - community-service
      - post-service
      - vote-service
      - comment-service
      - search-service
      - notification-service
      - media-service

volumes:
  pg-data:
  scylla-data:
  meili-data:
  minio-data:
