# Meilisearch StatefulSet for local development
---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  namespace: redyx-data
  labels:
    app: meilisearch
spec:
  ports:
    - port: 7700
      targetPort: 7700
      name: http
  selector:
    app: meilisearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: redyx-data
spec:
  serviceName: meilisearch
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.12
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_MASTER_KEY
              value: "dev-master-key"
            - name: MEILI_ENV
              value: "development"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: meilisearch-data
              mountPath: /meili_data
  volumeClaimTemplates:
    - metadata:
        name: meilisearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
