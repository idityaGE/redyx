# Redyx Services Helm Chart - Local Development Values
# Overrides for kind cluster deployment

global:
  image:
    # Never pull images - use kind load docker-image
    pullPolicy: Never
    tag: "dev"
  
  # OpenTelemetry tracing configuration
  otel:
    enabled: true
    endpoint: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"

# Lower resource limits for local development
services:
  skeleton:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    env:
      DATABASE_URL: "postgres://redyx:dev@postgresql.redyx-data.svc.cluster.local:5432/skeleton?sslmode=disable"
      REDIS_URL: "redis://redis-master.redyx-data.svc.cluster.local:6379/0"
      GRPC_PORT: "50051"
      METRICS_PORT: "9090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"
      OTEL_SERVICE_NAME: "skeleton-service"

  auth:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    env:
      DATABASE_URL: "postgres://redyx:dev@postgresql.redyx-data.svc.cluster.local:5432/auth?sslmode=disable"
      REDIS_URL: "redis://redis-master.redyx-data.svc.cluster.local:6379/1"
      GRPC_PORT: "50052"
      METRICS_PORT: "9090"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"
      OTEL_SERVICE_NAME: "auth-service"

  user:
    resources:
