      REDIS_URL: "redis://redis-master.redyx-data.svc.cluster.local:6379/2"
      GRPC_PORT: "50053"
      METRICS_PORT: "9090"
      POST_SERVICE_ADDR: "post-service.redyx-app.svc.cluster.local:50055"
      COMMENT_SERVICE_ADDR: "comment-service.redyx-app.svc.cluster.local:50057"
      COMMUNITY_SERVICE_ADDR: "community-service.redyx-app.svc.cluster.local:50054"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"
