# Redyx Services Helm Chart - Local Development Values
# Overrides for kind cluster deployment

global:
  image:
    # Never pull images - use kind load docker-image
    pullPolicy: Never
    tag: "dev"
  
  # OpenTelemetry tracing configuration
  otel:
    enabled: true
    endpoint: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"

# Lower resource limits for local development
services:
  skeleton:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    env:
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"
      OTEL_SERVICE_NAME: "skeleton-service"

  auth:
