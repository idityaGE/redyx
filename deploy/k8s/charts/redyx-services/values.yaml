# Redyx Services Helm Chart - Default Values
# All 12 microservices with environment variables from docker-compose.yml

global:
  # Image configuration
  image:
    registry: ""  # Empty for local images
    tag: "dev"
    pullPolicy: IfNotPresent
  
  # JWT secret shared across services
  jwtSecret: "dev-jwt-secret-32-bytes-minimum!!"
  
  # Kafka configuration
  kafka:
    brokers: "kafka.redyx-data.svc.cluster.local:9092"
  
  # OpenTelemetry configuration
  otel:
    enabled: true
    endpoint: "jaeger-collector.redyx-monitoring.svc.cluster.local:4317"
  
  # Data store DNS names (K8s internal)
  postgres:
    host: "postgresql.redyx-data.svc.cluster.local"
    port: 5432
    user: "redyx"
    password: "dev"
  
  redis:
    host: "redis-master.redyx-data.svc.cluster.local"
    port: 6379
  
  scylladb:
    hosts: "scylladb.redyx-data.svc.cluster.local:9042"
  
  meilisearch:
    url: "http://meilisearch.redyx-data.svc.cluster.local:7700"
    apiKey: "dev-master-key"
  
  minio:
    endpoint: "http://minio.redyx-data.svc.cluster.local:9000"
    publicEndpoint: "http://localhost:30900"  # NodePort for browser access
    accessKey: "minioadmin"
    secretKey: "minioadmin"
    bucket: "redyx-media"

# HPA defaults
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60

# Service-specific configurations
services:
  skeleton:
    enabled: true
    port: 50051
    metricsPort: 9090
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      DATABASE_URL: "postgres://redyx:dev@postgresql.redyx-data.svc.cluster.local:5432/skeleton?sslmode=disable"
      REDIS_URL: "redis://redis-master.redyx-data.svc.cluster.local:6379/0"
      GRPC_PORT: "50051"
      METRICS_PORT: "9090"
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20

  auth:
    enabled: true
    port: 50052
    metricsPort: 9090
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      DATABASE_URL: "postgres://redyx:dev@postgresql.redyx-data.svc.cluster.local:5432/auth?sslmode=disable"
      REDIS_URL: "redis://redis-master.redyx-data.svc.cluster.local:6379/1"
      GRPC_PORT: "50052"
      METRICS_PORT: "9090"
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20

  user:
