# Local StorageClass and PersistentVolumes for kind development
# Data is stored on the host machine at ~/.redyx-data (via kind extraMounts)
# and survives cluster deletion/recreation.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

# ─────────────────────────────────────────────────────────────
# Data stores
# ─────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgresql-pv
  labels:
    app: postgresql
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /opt/redyx-data/postgresql
    type: DirectoryOrCreate
---
