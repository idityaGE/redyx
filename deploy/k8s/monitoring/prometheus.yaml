# prometheus-community/kube-prometheus-stack values
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}  # Select ALL ServiceMonitors
    serviceMonitorNamespaceSelector: {}  # From ALL namespaces
    scrapeInterval: 15s
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  service:
    type: ClusterIP

# Disable components not needed for local dev
alertmanager:
  enabled: false

grafana:
  enabled: false  # We use separate Grafana release for dashboard control

# Prometheus Operator for ServiceMonitor CRD
prometheusOperator:
  enabled: true

# Node exporter for host metrics
nodeExporter:
  enabled: true

# Kube-state-metrics for K8s object metrics
kubeStateMetrics:
  enabled: true
