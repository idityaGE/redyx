# Kind cluster configuration for Redyx development
# Creates one control-plane node (ingress) + two worker nodes
#
# __DATA_DIR__ is replaced at cluster-creation time by `make k8s-create`
# with the value of DATA_DIR (default: ~/.redyx-data).

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: redyx
nodes:
  - role: control-plane
    # Port mappings for NGINX Ingress Controller
    # Using unprivileged ports for rootless Docker compatibility
    extraPortMappings:
      # HTTP ingress (container 80 -> host 8080)
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      # HTTPS ingress (container 443 -> host 8443)
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
    extraMounts:
      - hostPath: __DATA_DIR__
        containerPath: /opt/redyx-data
    # Labels for ingress controller scheduling
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
    extraMounts:
      - hostPath: __DATA_DIR__
        containerPath: /opt/redyx-data
  - role: worker
    extraMounts:
      - hostPath: __DATA_DIR__
        containerPath: /opt/redyx-data
