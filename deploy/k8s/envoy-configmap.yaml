# Envoy ConfigMap for K8s deployment
# This file is for manual creation when needed
# Use: kubectl create configmap envoy-config --from-file=envoy.yaml=deploy/envoy/envoy-k8s.yaml -n redyx-app
# And: kubectl create configmap envoy-proto --from-file=proto.pb=deploy/envoy/proto.pb -n redyx-app
#
# The Helm chart handles this automatically via the configmap.yaml template
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: redyx-app
data:
  # Actual content is in deploy/envoy/envoy-k8s.yaml
  # This file is a reference for manual kubectl operations
  envoy.yaml: |
    # See deploy/envoy/envoy-k8s.yaml for full configuration
    # This ConfigMap should be created using:
    # kubectl create configmap envoy-config --from-file=envoy.yaml=deploy/envoy/envoy-k8s.yaml -n redyx-app
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-proto
  namespace: redyx-app
binaryData:
  proto.pb: ""
  # This ConfigMap should be created using:
  # kubectl create configmap envoy-proto --from-file=proto.pb=deploy/envoy/proto.pb -n redyx-app
