admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
  - name: main
    address:
      socket_address: { address: 0.0.0.0, port_value: 8080 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              response_headers_to_add:
              - header:
                  key: access-control-allow-origin
                  value: "*"
              - header:
                  key: access-control-allow-methods
                  value: "GET, POST, PUT, DELETE, OPTIONS"
              - header:
                  key: access-control-allow-headers
                  value: "content-type, authorization"
              - header:
                  key: access-control-expose-headers
                  value: "grpc-status, grpc-message, retry-after"
              routes:
              # Routes match on incoming REST paths (match_incoming_request_route: true)
              # Specific routes BEFORE catch-all (Envoy uses first-match)
              - match: { prefix: "/api/v1/auth/" }
                route:
                  cluster: auth-service
                  timeout: 30s
              - match: { prefix: "/api/v1/users/" }
                route:
                  cluster: user-service
                  timeout: 30s
              - match: { prefix: "/api/v1/communities" }
                route:
                  cluster: community-service
                  timeout: 30s
              # Catch-all for remaining /api/v1/ routes (health, etc.)
              - match: { prefix: "/api/v1/" }
                route:
                  cluster: skeleton-service
                  timeout: 30s
          http_filters:
          - name: envoy.filters.http.grpc_json_transcoder
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
              proto_descriptor: "/etc/envoy/proto.pb"
              services:
                - redyx.health.v1.HealthService
                - redyx.auth.v1.AuthService
                - redyx.user.v1.UserService
                - redyx.community.v1.CommunityService
                - redyx.ratelimit.v1.RateLimitService
              # CRITICAL: match routes on incoming REST path, not rewritten gRPC path (Pitfall 2)
              match_incoming_request_route: true
              print_options:
                add_whitespace: true
                always_print_primitive_fields: true
                always_print_enums_as_ints: false
                # camelCase JSON output — proto3 canonical (Pitfall 1)
                preserve_proto_field_names: false
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: skeleton-service
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    # CRITICAL: gRPC requires HTTP/2 upstream (Pitfall 5)
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: skeleton-service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: skeleton-service, port_value: 50051 }

  - name: auth-service
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: auth-service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: auth-service, port_value: 50052 }

  - name: user-service
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: user-service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: user-service, port_value: 50053 }

  - name: community-service
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: community-service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: community-service, port_value: 50054 }
